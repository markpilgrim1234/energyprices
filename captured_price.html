<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Captured prices &amp; rates</title>
  <style>
    :root {
      --bg: #f6f7f2;
      --panel: #ffffff;
      --ink: #18201c;
      --muted: #667069;
      --line: #d9dfd7;
      --dark: #4a4f4b;
      --green: #1f8a70;
      --red: #c83f3f;
      --shadow: 0 12px 34px rgba(31, 44, 37, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 38px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      margin-bottom: 18px;
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
    }
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .subtitle {
      max-width: 650px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 12px;
      min-width: min(820px, 100%);
    }
    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      padding: 0 12px;
    }
    select:disabled { opacity: 0.48; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }
    .stat,
    .chart-panel,
    .table-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .stat {
      padding: 14px 16px;
    }
    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .stat strong {
      display: block;
      margin-top: 8px;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1;
    }
    .chart-panel {
      padding: 18px;
      overflow-x: auto;
    }
    .chart-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
      font-size: 12px;
    }
    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
    }
    svg {
      display: block;
      width: 100%;
      min-width: 780px;
      height: auto;
    }
    .grid { stroke: var(--line); stroke-width: 1; }
    .axis { stroke: #8b948e; stroke-width: 1.5; }
    .tick { fill: var(--muted); font-size: 12px; }
    .axis-label { fill: var(--muted); font-size: 13px; font-weight: 800; }
    .bar { fill: var(--dark); opacity: 0.8; }
    .line {
      fill: none;
      stroke: var(--green);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .monthly-captured { fill: var(--dark); }
    .monthly-baseload { fill: #a9b1ab; }
    .table-panel {
      margin-top: 14px;
      padding: 14px 16px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }
    th:first-child,
    td:first-child { text-align: left; }
    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }
    @media (max-width: 980px) {
      header { display: grid; }
      .controls { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      main { width: min(100vw - 20px, 1180px); padding-top: 18px; }
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <a class="back-link" href="spot_prices.html">&lt;-- Back to spot prices</a>
    <header>
      <div>
        <h1>Captured prices &amp; rates</h1>
        <p class="subtitle">Synthetic generation profiles weighted against hourly wholesale prices.</p>
        <p style="margin: 10px 0 0; color: #25322d; font-size: 14px; font-weight: 800;">Latest available date: June 06, 2026</p>
      </div>
      <div class="controls">
        <label>
          Country
          <select id="countrySelect"></select>
        </label>
        <label>
          Year
          <select id="yearSelect"></select>
        </label>
        <label>
          Month
          <select id="monthSelect"></select>
        </label>
        <label>
          Technology
          <select id="technologySelect"></select>
        </label>
        <label>
          View
          <select id="viewSelect">
            <option value="hourly">Hourly profile</option>
            <option value="monthly">Monthly trend</option>
            <option value="monthly_rate">Monthly captured rate</option>
          </select>
        </label>
      </div>
    </header>

    <section class="chart-panel">
      <div class="chart-head">
        <div id="chartTitle">Loading data...</div>
        <div class="legend" id="legend"></div>
      </div>
      <svg id="chart" viewBox="0 0 1100 520" role="img" aria-labelledby="chartTitle"></svg>
    </section>

    <section class="table-panel">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>
    <footer style="margin-top: 28px; color: #667069; font-size: 13px;">Source: Ember, Entsoe</footer>
  </main>

  <script src="data/spot_prices.js"></script>
  <script src="data/generation_profiles.js"></script>
  <script>
    const countrySelect = document.querySelector("#countrySelect");
    const yearSelect = document.querySelector("#yearSelect");
    const monthSelect = document.querySelector("#monthSelect");
    const technologySelect = document.querySelector("#technologySelect");
    const viewSelect = document.querySelector("#viewSelect");
    const chartTitle = document.querySelector("#chartTitle");
    const chart = document.querySelector("#chart");
    const legend = document.querySelector("#legend");
    const tableHead = document.querySelector("#tableHead");
    const tableBody = document.querySelector("#tableBody");
    let spotData;
    let profileData;

    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const el = (name, attrs = {}, text = "") => {
      const node = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
      if (text) node.textContent = text;
      return node;
    };
    const fmt = (value, digits = 2) => value === null || value === undefined || Number.isNaN(value) ? "-" : value.toFixed(digits);
    const fmtPrice = (value) => value === null || value === undefined || Number.isNaN(value) ? "-" : `${value.toFixed(2)}`;
    const fmtRate = (value) => value === null || value === undefined || Number.isNaN(value) ? "-" : `${(value * 100).toFixed(1)}%`;
    const monthLabel = (key) => {
      const [year, month] = key.split("-").map(Number);
      return new Intl.DateTimeFormat("en", { month: "long", year: "numeric" }).format(new Date(year, month - 1, 1));
    };

    function populateCountries() {
      countrySelect.innerHTML = "";
      spotData.countries.forEach((country) => {
        const option = document.createElement("option");
        option.value = country.name;
        option.textContent = `${country.name} (${country.iso3})`;
        countrySelect.append(option);
      });
    }

    function populateTechnologies() {
      technologySelect.innerHTML = "";
      Object.entries(profileData.technologies).forEach(([key, tech]) => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = tech.label;
        technologySelect.append(option);
      });
    }

    function countryYears(countryName) {
      return spotData.countries.find((country) => country.name === countryName).years;
    }

    function populateYears(countryName) {
      yearSelect.innerHTML = "";
      countryYears(countryName).slice().reverse().forEach((year) => {
        const option = document.createElement("option");
        option.value = year;
        option.textContent = year;
        yearSelect.append(option);
      });
    }

    function populateMonths(countryName, year) {
      monthSelect.innerHTML = "";
      const months = Object.keys(spotData.series[countryName].years[year].months).sort();
      months.forEach((month) => {
        const option = document.createElement("option");
        option.value = month;
        option.textContent = monthLabel(month).replace(` ${year}`, "");
        monthSelect.append(option);
      });
    }

    function profileFor(monthKey) {
      const month = monthKey.slice(5, 7);
      return profileData.technologies[technologySelect.value].months[month];
    }

    function capturedForMonth(monthData, weights) {
      if (!monthData || !monthData.hourlyAveragePrices) return null;
      let weighted = 0;
      let weightTotal = 0;
      monthData.hourlyAveragePrices.forEach((price, hour) => {
        const weight = weights[hour] || 0;
        if (price !== null && price !== undefined && weight > 0) {
          weighted += price * weight;
          weightTotal += weight;
        }
      });
      return weightTotal ? weighted / weightTotal : null;
    }

    function selectedMonthData() {
      return spotData.series[countrySelect.value].years[yearSelect.value].months[monthSelect.value];
    }

    function monthlyRows() {
      const months = spotData.series[countrySelect.value].years[yearSelect.value].months;
      return Object.keys(months).sort().map((monthKey) => {
        const monthData = months[monthKey];
        const captured = capturedForMonth(monthData, profileFor(monthKey));
        const baseload = monthData.averagePrice;
        return {
          monthKey,
          label: monthNames[Number(monthKey.slice(5, 7)) - 1],
          captured,
          baseload,
          captureRate: baseload ? captured / baseload : null,
        };
      });
    }

    function hourlyRows() {
      const monthData = selectedMonthData();
      const weights = profileFor(monthSelect.value);
      return weights.map((weight, hour) => {
        const price = monthData.hourlyAveragePrices[hour];
        return {
          hour,
          price,
          weight,
          weightedPrice: price === null || price === undefined ? null : price * weight,
        };
      });
    }

    function drawAxes(width, height, margin, maxValue, yLabel) {
      const innerHeight = height - margin.top - margin.bottom;
      const baseY = margin.top + innerHeight;
      for (let i = 0; i <= 4; i += 1) {
        const value = maxValue * (1 - i / 4);
        const y = margin.top + (innerHeight * i) / 4;
        chart.append(el("line", { class: "grid", x1: margin.left, y1: y, x2: width - margin.right, y2: y }));
        chart.append(el("text", { class: "tick", x: 16, y: y + 4 }, fmt(value, value >= 10 ? 0 : 2)));
      }
      chart.append(el("line", { class: "axis", x1: margin.left, y1: baseY, x2: width - margin.right, y2: baseY }));
      chart.append(el("line", { class: "axis", x1: margin.left, y1: margin.top, x2: margin.left, y2: baseY }));
      chart.append(el("text", { class: "axis-label", x: 16, y: margin.top - 8 }, yLabel));
      return baseY;
    }

    function drawHourly() {
      const rows = hourlyRows();
      const monthData = selectedMonthData();
      const weights = profileFor(monthSelect.value);
      const captured = capturedForMonth(monthData, weights);
      const baseload = monthData.averagePrice;
      chartTitle.textContent = `${countrySelect.value}: hourly profile, ${monthLabel(monthSelect.value)}`;
      legend.innerHTML = `<span><i class="swatch" style="background: var(--dark)"></i>Generation weight</span><span><i class="swatch" style="background: var(--green)"></i>Average price</span>`;
      chart.innerHTML = "";

      const width = 1100;
      const height = 520;
      const margin = { top: 42, right: 42, bottom: 62, left: 64 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;
      const baseY = drawAxes(width, height, margin, Math.max(1, ...rows.map((row) => row.price || 0)), "EUR/MWh");
      const maxWeight = Math.max(0.001, ...rows.map((row) => row.weight));
      const maxPrice = Math.max(1, ...rows.map((row) => row.price || 0));
      const slot = innerWidth / 24;
      const barWidth = slot * 0.62;
      const points = [];

      rows.forEach((row, index) => {
        const x = margin.left + index * slot + (slot - barWidth) / 2;
        const barHeight = (row.weight / maxWeight) * innerHeight * 0.88;
        chart.append(el("rect", { class: "bar", x, y: baseY - barHeight, width: barWidth, height: barHeight, rx: 3 }));
        chart.append(el("text", { class: "tick", x: margin.left + index * slot + slot / 2, y: height - 28, "text-anchor": "middle" }, String(row.hour).padStart(2, "0")));
        if (row.price !== null && row.price !== undefined) {
          const y = baseY - (row.price / maxPrice) * innerHeight;
          points.push(`${margin.left + index * slot + slot / 2},${y}`);
        }
      });
      if (points.length) chart.append(el("polyline", { class: "line", points: points.join(" ") }));
      chart.append(el("text", { class: "axis-label", x: margin.left, y: height - 12 }, "Hour"));

      tableHead.innerHTML = "<tr><th>Hour</th><th>Avg price</th><th>Generation weight</th><th>Weighted contribution</th></tr>";
      tableBody.innerHTML = rows.map((row) => `
        <tr>
          <td>${String(row.hour).padStart(2, "0")}:00</td>
          <td>${fmtPrice(row.price)}</td>
          <td>${fmt(row.weight * 100, 2)}%</td>
          <td>${fmt(row.weightedPrice, 3)}</td>
        </tr>
      `).join("");
    }

    function drawMonthly() {
      const rows = monthlyRows();
      const valid = rows.filter((row) => row.captured !== null && row.baseload !== null);
      const selected = rows.find((row) => row.monthKey === monthSelect.value) || valid[valid.length - 1];
      chartTitle.textContent = `${countrySelect.value}: monthly captured price, ${yearSelect.value}`;
      legend.innerHTML = `<span><i class="swatch" style="background: var(--dark)"></i>Captured price</span><span><i class="swatch" style="background: #a9b1ab"></i>Baseload average</span>`;
      chart.innerHTML = "";

      const width = 1100;
      const height = 520;
      const margin = { top: 42, right: 42, bottom: 62, left: 64 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;
      const maxValue = Math.max(1, ...rows.flatMap((row) => [row.captured || 0, row.baseload || 0]));
      const baseY = drawAxes(width, height, margin, maxValue, "EUR/MWh");
      const slot = innerWidth / Math.max(1, rows.length);
      const barWidth = slot * 0.32;

      rows.forEach((row, index) => {
        const x = margin.left + index * slot + slot * 0.18;
        const capturedHeight = row.captured === null ? 0 : (row.captured / maxValue) * innerHeight;
        const baseloadHeight = row.baseload === null ? 0 : (row.baseload / maxValue) * innerHeight;
        chart.append(el("rect", { class: "monthly-captured", x, y: baseY - capturedHeight, width: barWidth, height: capturedHeight, rx: 3 }));
        chart.append(el("rect", { class: "monthly-baseload", x: x + barWidth + 4, y: baseY - baseloadHeight, width: barWidth, height: baseloadHeight, rx: 3 }));
        chart.append(el("text", { class: "tick", x: margin.left + index * slot + slot / 2, y: height - 28, "text-anchor": "middle" }, row.label));
      });
      chart.append(el("text", { class: "axis-label", x: margin.left, y: height - 12 }, "Month"));

      tableHead.innerHTML = "<tr><th>Month</th><th>Captured price</th><th>Baseload average</th><th>Capture rate</th></tr>";
      tableBody.innerHTML = rows.map((row) => `
        <tr>
          <td>${monthLabel(row.monthKey)}</td>
          <td>${fmtPrice(row.captured)}</td>
          <td>${fmtPrice(row.baseload)}</td>
          <td>${fmtRate(row.captureRate)}</td>
        </tr>
      `).join("");
    }

    function drawMonthlyRate() {
      const rows = monthlyRows();
      chartTitle.textContent = `${countrySelect.value}: monthly captured rate, ${yearSelect.value}`;
      legend.innerHTML = `<span><i class="swatch" style="background: var(--green)"></i>Captured rate</span>`;
      chart.innerHTML = "";

      const width = 1100;
      const height = 520;
      const margin = { top: 42, right: 42, bottom: 62, left: 64 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;
      const maxValue = Math.max(1, ...rows.map((row) => row.captureRate || 0));
      const baseY = drawAxes(width, height, margin, maxValue * 100, "%");
      const slot = innerWidth / Math.max(1, rows.length);
      const barWidth = slot * 0.54;

      rows.forEach((row, index) => {
        const x = margin.left + index * slot + (slot - barWidth) / 2;
        const value = row.captureRate === null ? 0 : row.captureRate * 100;
        const barHeight = (value / (maxValue * 100)) * innerHeight;
        chart.append(el("rect", { class: "bar", x, y: baseY - barHeight, width: barWidth, height: barHeight, rx: 3 }));
        chart.append(el("text", { class: "tick", x: margin.left + index * slot + slot / 2, y: height - 28, "text-anchor": "middle" }, row.label));
      });
      chart.append(el("text", { class: "axis-label", x: margin.left, y: height - 12 }, "Month"));

      tableHead.innerHTML = "<tr><th>Month</th><th>Captured rate</th><th>Captured price</th><th>Baseload average</th></tr>";
      tableBody.innerHTML = rows.map((row) => `
        <tr>
          <td>${monthLabel(row.monthKey)}</td>
          <td>${fmtRate(row.captureRate)}</td>
          <td>${fmtPrice(row.captured)}</td>
          <td>${fmtPrice(row.baseload)}</td>
        </tr>
      `).join("");
    }

    function render() {
      monthSelect.disabled = viewSelect.value !== "hourly";
      if (viewSelect.value === "monthly") {
        drawMonthly();
      } else if (viewSelect.value === "monthly_rate") {
        drawMonthlyRate();
      } else {
        drawHourly();
      }
    }

    function updateCountry() {
      populateYears(countrySelect.value);
      populateMonths(countrySelect.value, yearSelect.value);
      render();
    }

    function updateYear() {
      populateMonths(countrySelect.value, yearSelect.value);
      render();
    }

    function boot() {
      spotData = window.SPOT_PRICE_DATA;
      profileData = window.GENERATION_PROFILE_DATA;
      populateCountries();
      populateTechnologies();
      const defaultCountry = spotData.countries.find((country) => country.name === "Germany") || spotData.countries[0];
      countrySelect.value = defaultCountry.name;
      populateYears(defaultCountry.name);
      populateMonths(defaultCountry.name, yearSelect.value);
      technologySelect.value = "solar_pv";
      render();
    }

    countrySelect.addEventListener("change", updateCountry);
    yearSelect.addEventListener("change", updateYear);
    monthSelect.addEventListener("change", render);
    technologySelect.addEventListener("change", render);
    viewSelect.addEventListener("change", render);

    if (window.SPOT_PRICE_DATA && window.GENERATION_PROFILE_DATA) {
      boot();
    } else {
      chartTitle.textContent = "Data file not found. Run scripts/build_negative_prices.py first.";
    }
  </script>
</body>
</html>
